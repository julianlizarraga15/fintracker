name: Apply mobile source fix

on:
  push:
    branches:
      - fix/source-mobile-layout

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move mobile styles into index.html
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('frontend/index.html')
          text = path.read_text()
          marker = '    </style>\n  </head>'
          if 'source-mobile-layout-fix' not in text:
              css = '''    <style id="source-mobile-layout-fix">
      @media (max-width: 700px) {
        #rows-body > tr:not(.details-row) > td:first-child:has(> .toggle-button) {
          display: grid !important;
          grid-template-columns: minmax(0, 1fr) auto;
          grid-template-rows: auto auto auto;
          column-gap: 12px;
          row-gap: 2px;
          align-items: start;
          padding: 10px 0 14px;
          text-align: left;
          font-weight: 400;
        }

        #rows-body > tr:not(.details-row) > td:first-child:has(> .toggle-button)::before {
          content: none;
        }

        #rows-body > tr:not(.details-row) > td:first-child:has(> .toggle-button) > div:first-child {
          grid-column: 1;
          grid-row: 1;
          min-width: 0;
          font-size: 1.05rem;
          font-weight: 700;
          overflow-wrap: normal;
          word-break: normal;
        }

        #rows-body > tr:not(.details-row) > td:first-child:has(> .toggle-button) > div:nth-child(2) {
          grid-column: 1;
          grid-row: 2;
          min-width: 0;
          overflow-wrap: normal;
          word-break: normal;
        }

        #rows-body > tr:not(.details-row) > td:first-child:has(> .toggle-button) > div:nth-child(3) {
          grid-column: 1 / -1;
          grid-row: 3;
          min-width: 0;
          margin-top: 6px;
          line-height: 1.4;
          overflow-wrap: anywhere;
        }

        #rows-body > tr:not(.details-row) > td:first-child:has(> .toggle-button) > .toggle-button {
          grid-column: 2;
          grid-row: 1 / span 2;
          align-self: center;
          justify-self: end;
          flex: none;
        }
      }
    </style>\n'''
              if marker not in text:
                  raise SystemExit('Could not find style insertion point')
              text = text.replace(marker, '    </style>\n' + css + '  </head>', 1)
              path.write_text(text)
          PY

          git checkout origin/main -- frontend/Dockerfile
          rm -f frontend/mobile.css
          rm -f .github/workflows/apply-mobile-fix.yml

      - name: Commit cleaned-up implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Embed mobile source styles in index" || exit 0
          git push
